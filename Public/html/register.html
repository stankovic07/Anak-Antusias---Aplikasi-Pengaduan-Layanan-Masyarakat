<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMART CITY - REGISTER</title>

    <!-- FONTAWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- BOOTSTRAP CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/default.css" />
    <link rel="stylesheet" href="css/register.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar bg-body-tertiary">
      <div class="container-fluid justify-content-center">
        <p class="navbar-brand mb-0 h1 fw-bolder">
          SMART <span class="text-primary">CITY</span>
        </p>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container">
      <h3 class="text-center mb-5 fw-bold">DAFTAR AKUN KAMU</h3>

      <section class="card shadow">
        <div class="row g-0">
          <!-- KIRI -->
          <div
            class="col-md-6 p-4 d-flex justify-content-center align-items-center flex-column"
            id="kanan">
            <h3 class="text-center fw-bold">SUDAH PUNYA AKUN?</h3>
            <p>Gunakan akun anda untuk mengakses dashboard</p>
            <a class="btn btn-outline-primary" href="login.html">LOGIN</a>
          </div>

          <!-- KANAN -->
          <div class="col-md-6 p-4 border-end" id="kiri">
            <form id="registerForm">
              <div class="mb-3">
                <label>Username</label>
                <input
                  type="text"
                  id="name"
                  class="form-control"
                  placeholder="Buat Username"
                  required />
              </div>

              <div class="mb-3">
                <label>Email</label>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Buat Email"
                  required />
              </div>

              <div class="mb-3">
                <label>Password</label>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Buat Password"
                  required />
              </div>

              <div class="mb-3">
                <label>No HP</label>
                <input
                  type="text"
                  id="phone"
                  class="form-control"
                  placeholder="Masukkan No HP" />
              </div>

              <div class="mb-3">
                <label>Alamat</label>
                <input
                  type="text"
                  id="address"
                  class="form-control"
                  placeholder="Masukkan Alamat" />
              </div>

              <div class="mb-3">
                <label>Role</label>
                <select id="role" class="form-control">
                  <option value="citizen">Citizen</option>
                  <option value="admin">Admin</option>
                </select>
              </div>

              <button type="submit" class="btn btn-primary w-100 mb-2">
                Register
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      <p class="text-center">
        @ 2026 Smart City Pengaduan. All rights reserved.
      </p>
    </footer>

    <script src="JS/register.js"></script>
  </body>
</html>
