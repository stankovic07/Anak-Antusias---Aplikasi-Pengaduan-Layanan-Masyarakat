<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Laporan - Smart City</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/default.css">
</head>
<body>


<main class="container py-4">
  <!-- Report content -->
  <div id="reportContainer" class="card shadow-sm p-4 mb-4">
    <p class="text-center text-muted py-5">Memuat laporan...</p>
  </div>

  <!-- Comments Section -->
  <div class="card shadow-sm p-4">
    <h4 class="fw-bold mb-3">💬 Komentar <span id="commentCount" class="text-muted fs-6">(0)</span></h4>
    <div id="commentsList" class="mb-3"></div>

    <!-- Comment form (hidden for guests) -->
    <div id="commentForm" class="border-top pt-3" style="display:none;">
      <textarea id="commentInput" rows="2" class="form-control mb-2" placeholder="Tulis komentar..."></textarea>
      <div class="d-flex gap-2">
        <button id="submitCommentBtn" class="btn btn-primary btn-sm">
          <i class="fas fa-paper-plane me-1"></i> Kirim
        </button>
        <button id="cancelReplyBtn" class="btn btn-outline-secondary btn-sm" style="display:none;">Batal</button>
      </div>
    </div>
  </div>
</main>

<!-- Flag Modal -->
<div class="modal fade" id="flagModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Tandai Laporan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Mengapa Anda menandai laporan ini?</p>
        <textarea id="flagReasonModal" class="form-control" rows="3" placeholder="Alasan (opsional)"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-warning" id="confirmFlagBtn"><i class="fas fa-flag"></i> Tandai</button>
      </div>
    </div>
  </div>
</div>

<footer class="text-center py-3 text-muted">@ 2026 Smart City Pengaduan.</footer>

<script src="../js/navbar.js"></script>
<script src="../js/report-detail.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
