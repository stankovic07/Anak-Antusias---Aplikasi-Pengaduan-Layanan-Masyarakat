<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Laporan - Smart City</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

<!-- ========== NAVBAR AKAN DIGANTI OLEH JAVASCRIPT ========== -->
<nav id="navbarContainer" class="bg-white shadow p-4 mb-6">
  <div class="container mx-auto flex justify-between items-center">
    <span class="text-xl font-bold text-gray-800">Smart City</span>
    <span>Memuat...</span>
  </div>
</nav>

<div class="container mx-auto px-4 pb-12">
  <div id="reportContainer" class="bg-white rounded-lg shadow-md p-6 mb-6">
    <p class="text-center text-gray-500 py-6"><i class="fas fa-spinner fa-spin"></i> Memuat...</p>
  </div>

  <!-- Comments Section -->
  <div class="bg-white rounded-lg shadow-md p-6">
    <h2 class="text-xl font-semibold mb-4">Komentar <span id="commentCount"></span></h2>
    <div id="commentsList" class="space-y-4 mb-4"></div>

    <div id="commentForm" class="hidden border-t pt-4">
      <textarea id="commentInput" rows="2" class="w-full border rounded p-2" placeholder="Tulis komentar..."></textarea>
      <div class="flex gap-2 mt-2">
        <button id="submitCommentBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          <i class="fas fa-paper-plane"></i> Kirim
        </button>
        <button id="cancelReplyBtn" class="hidden bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">
          Batal Membalas
        </button>
      </div>
    </div>
  </div>
</div>

<script src="/js/report-detail.js"></script>
</body>
</html>
