<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profil - Smart City</title>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/default.css" />
</head>
<body>
  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid justify-content-center">
      <p class="navbar-brand mb-0 h1 fw-bolder">
        SMART <span class="text-primary">CITY</span>
      </p>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="text-center fw-bold mb-4">Edit Profil</h2>

    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
      <form id="editProfileForm">
        <div class="mb-3">
          <label for="currentPassword" class="form-label">
            Password Saat Ini <span class="text-danger">*</span>
          </label>
          <input
            type="password"
            class="form-control"
            id="currentPassword"
            placeholder="Masukkan password Anda"
            required
          />
          <div class="form-text">Wajib diisi untuk menyimpan perubahan apapun.</div>
        </div>

        <hr />

        <!-- Alamat -->
        <div class="mb-3">
          <label for="address" class="form-label">Alamat</label>
          <textarea
            class="form-control"
            id="address"
            rows="3"
            placeholder="Masukkan alamat lengkap"
          ></textarea>
        </div>

        <!-- Telepon -->
        <div class="mb-3">
          <label for="phone" class="form-label">Nomor Telepon</label>
          <input
            type="text"
            class="form-control"
            id="phone"
            placeholder="Masukkan nomor telepon"
          />
        </div>

        <hr />

        <!-- Password baru (opsional) -->
        <div class="mb-3">
          <label for="newPassword" class="form-label">Password Baru</label>
          <input
            type="password"
            class="form-control"
            id="newPassword"
            placeholder="Kosongkan jika tidak ingin mengubah"
          />
        </div>

        <!-- Konfirmasi Password Baru -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Konfirmasi Password Baru</label>
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            placeholder="Ulangi password baru"
          />
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="fa-solid fa-floppy-disk me-2"></i> Simpan Perubahan
        </button>
      </form>

      <div id="message" class="mt-3"></div>
    </div>
  </main>

  <footer class="text-center text-muted py-3">
    @ 2026 Smart City Pengaduan. All rights reserved.
  </footer>

  <script src="../js/edit-profile.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
