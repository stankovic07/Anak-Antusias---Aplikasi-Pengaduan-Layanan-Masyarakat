<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buat Laporan - Smart City</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/default.css" />
  </head>
  <body>
    <!-- Navbar (sama seperti sebelumnya) -->

    <main class="container py-5">
      <h2 class="text-center fw-bold mb-4">Buat Laporan Baru</h2>
      <div class="card shadow p-4 mx-auto" style="max-width: 600px">
        <form id="reportForm" enctype="multipart/form-data">
          <div class="mb-3">
            <label for="title" class="form-label"
              >Judul <span class="text-danger">*</span></label
            >
            <input
              type="text"
              id="title"
              name="title"
              class="form-control"
              placeholder="Masukkan judul singkat"
              required
            />
          </div>
          <div class="mb-3">
            <label for="description" class="form-label"
              >Deskripsi <span class="text-danger">*</span></label
            >
            <textarea
              id="description"
              name="description"
              rows="4"
              class="form-control"
              placeholder="Jelaskan masalah yang terjadi"
              required
            ></textarea>
          </div>
          <div class="mb-3">
            <label for="location_text" class="form-label"
              >Lokasi Kejadian</label
            >
            <input
              type="text"
              id="location_text"
              name="location_text"
              class="form-control"
              placeholder="Nama jalan / area"
            />
          </div>
          <div class="mb-3">
            <label for="facility_id" class="form-label"
              >Fasilitas Terdekat (opsional)</label
            >
            <select id="facility_id" name="facility_id" class="form-select">
              <option value="">-- Pilih Fasilitas --</option>
            </select>
            <div class="form-text">
              Pilih fasilitas jika lokasi berada di dekat fasilitas umum. Lokasi
              akan otomatis terisi.
            </div>
          </div>
          <div class="mb-3">
            <input type="file" id="image" name="image" accept="image/*" class="form-control">
            <label for="image" class="form-label"
              >Foto Laporan (opsional)</label
            >
            
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="fas fa-paper-plane me-2"></i> Kirim Laporan
          </button>
        </form>
        <div id="message" class="mt-3"></div>
      </div>
    </main>

    <footer class="text-center py-3 text-muted">
      @ 2026 Smart City Pengaduan.
    </footer>

    <script src="../js/navbar.js"></script>
    <script src="../js/authguard.js"></script>
    <script src="../js/report-form.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
