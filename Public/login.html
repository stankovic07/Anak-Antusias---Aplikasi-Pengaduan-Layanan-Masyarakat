<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMART CITY - LOGIN</title>

    <!-- FONTAWESOME CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- BOOTSTRAP CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/default.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar bg-body-tertiary">
      <div class="container-fluid justify-content-center">
        <p class="navbar-brand mb-0 h1 fw-bolder">
          SMART <span class="text-primary">CITY</span>
        </p>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container">
      <h3 class="text-center mb-5 fw-bold">LOGIN AKUN KAMU</h3>

      <section class="card shadow">
        <div class="row g-0">
          <!-- KIRI -->
          <div class="col-md-6 p-4 border-end" id="kiri">
            <div class="d-flex justify-content-center align-items-center mb-3">
              <i class="fa-solid fa-circle-user fa-3x"></i>
            </div>

            <form id="loginForm">
              <div class="mb-3">
                <label>Email</label>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Masukkan Email"
                  required />
              </div>

              <div class="mb-3">
                <label>Password</label>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Masukkan Password"
                  required />
              </div>

              <button type="submit" class="btn btn-primary w-100 mb-2">
                Login
              </button>
            </form>
          </div>

          <!-- KANAN -->
          <div
            class="col-md-6 p-4 d-flex justify-content-center align-items-center flex-column"
            id="kanan">
            <h3 class="text-center fw-bold">BELUM PUNYA AKUN?</h3>
            <p>Daftar sekarang dan mulai gunakan layanan kami!</p>
            <a class="btn btn-outline-primary" href="register.html">REGISTER</a>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      <p class="text-center">
        @ 2026 Smart City Pengaduan. All rights reserved.
      </p>
    </footer>
    <script src="/JS/login.js"></script>
  </body>
</html>
